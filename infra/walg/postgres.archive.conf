# Phase 1.5 #7 — PostgreSQL WAL archiving for WAL-G.
# Loaded via include_dir from the custom postgres image (infra/walg/Dockerfile).

# Stream every WAL segment to wal-g; wal-g then PUTs it to the
# configured S3 prefix. `archive_mode = on` requires server restart
# when toggling, so this lives in a static conf file rather than ALTER
# SYSTEM.
archive_mode = on
archive_command = 'wal-g wal-push %p'
archive_timeout = 60

# WAL must be detailed enough that wal-g can do PITR.
wal_level = replica
max_wal_senders = 3
max_replication_slots = 3
