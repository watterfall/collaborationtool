services:
  postgres:
    image: postgres:16-alpine
    container_name: collaborationtool-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: collab
      POSTGRES_PASSWORD: collab
      POSTGRES_DB: collaborationtool
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collab -d collaborationtool"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: collaborationtool-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: collab
      MINIO_ROOT_PASSWORD: collab12345
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - "CMD"
        - "/usr/bin/mc"
        - "ready"
        - "local"
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job — creates the y-sweet bucket on first boot.
  minio-bucket-init:
    image: minio/mc:latest
    container_name: collaborationtool-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-c"
      - >
        set -e;
        mc alias set local http://minio:9000 collab collab12345;
        mc mb --ignore-existing local/y-sweet;
        echo "[minio-init] bucket y-sweet ready";
    restart: "no"

  ysweet:
    image: ghcr.io/jamsocket/y-sweet:latest
    container_name: collaborationtool-ysweet
    restart: unless-stopped
    # Image default CMD is `serve-doc` (single-doc mode). We want the
    # multi-doc `serve` mode so the gateway can mint per-document tokens.
    command: ["y-sweet", "serve", "--host=0.0.0.0", "s3://y-sweet/docs"]
    depends_on:
      minio:
        condition: service_healthy
      minio-bucket-init:
        condition: service_completed_successfully
    environment:
      # S3-compat target for doc persistence. Path-style works against
      # both MinIO (dev) and most S3-compats (R2 / Tigris).
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ACCESS_KEY_ID: collab
      AWS_SECRET_ACCESS_KEY: collab12345
      AWS_REGION: us-east-1
      AWS_S3_USE_PATH_STYLE: "true"
      # Server-side private key. New y-sweet validates this as a
      # structured token (generated via `y-sweet gen-auth`). The matching
      # server_token goes into apps/sync-gateway's YSWEET_AUTH so it can
      # mint per-doc client tokens. ROTATE BOTH IN PRODUCTION.
      Y_SWEET_AUTH: UcFSSu_5QSsOuZedIhQpix7QzK7X3IwDcW27iqMd
      # Public host the y-websocket clients connect to. Phase 1 dev:
      # localhost. Phase 1.5 production sets this to the deployment URL.
      Y_SWEET_URL_PREFIX: http://localhost:8080
    ports:
      - "8080:8080"
    # Image has no curl/wget; use bash /dev/tcp to probe the listener.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pg-data:
  minio-data:
