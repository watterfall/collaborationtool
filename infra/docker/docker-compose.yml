services:
  postgres:
    image: postgres:16-alpine
    container_name: collaborationtool-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: collab
      POSTGRES_PASSWORD: collab
      POSTGRES_DB: collaborationtool
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collab -d collaborationtool"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-data:
