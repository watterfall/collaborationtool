<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>proto-a · Yjs heterogeneous schema</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      crossorigin="anonymous"
    />
    <style>
      :root {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        line-height: 1.6;
      }
      body {
        margin: 0;
        padding: 24px;
        max-width: 960px;
        margin-inline: auto;
      }
      header {
        border-bottom: 1px solid #ccc;
        padding-bottom: 12px;
        margin-bottom: 16px;
      }
      header h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }
      header small {
        color: #666;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 12px 0;
      }
      .toolbar button {
        padding: 4px 10px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #888;
        background: #fff;
        border-radius: 4px;
      }
      .toolbar button:hover {
        background: #f4f4f4;
      }
      .editor-shell {
        border: 1px solid #ddd;
        padding: 16px;
        min-height: 240px;
        border-radius: 4px;
      }
      .ProseMirror:focus {
        outline: none;
      }
      .ProseMirror p {
        margin: 0 0 0.6em;
      }
      .pm-node-citation-ref {
        background: #eef5ff;
        border: 1px solid #b8d4ff;
        padding: 0 4px;
        border-radius: 3px;
        font-size: 0.85em;
        cursor: default;
      }
      .pm-node-dataset-ref {
        background: #f0fff0;
        border: 1px solid #b9e6b9;
        padding: 0 4px;
        border-radius: 3px;
        font-size: 0.85em;
      }
      .pm-node-equation {
        display: block;
        text-align: center;
        margin: 12px 0;
        padding: 8px;
        background: #fafafa;
        border-radius: 4px;
      }
      .pm-node-inline-equation {
        background: #fafafa;
        padding: 0 4px;
        border-radius: 3px;
      }
      .pm-node-computational-cell {
        display: block;
        background: #faf5ee;
        border: 1px dashed #b89c5a;
        padding: 8px 12px;
        margin: 8px 0;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
      }
      .pm-node-figure {
        display: block;
        border-left: 3px solid #ddd;
        padding: 4px 12px;
        margin: 12px 0;
      }
      .pm-mark-annotation-anchor {
        background: #fff8c5;
        border-bottom: 2px dotted #c8a900;
      }
      .pm-node-footnote-ref {
        font-size: 0.7em;
        vertical-align: super;
        color: #c33;
        margin: 0 1px;
      }
      .status {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .status .label {
        font-weight: bold;
        margin-right: 4px;
      }
      .json-dump {
        font-size: 11px;
        background: #f7f7f7;
        padding: 8px;
        border-radius: 4px;
        max-height: 240px;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
