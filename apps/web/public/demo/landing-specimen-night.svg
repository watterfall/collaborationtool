<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" font-family="ui-serif, 'Source Serif 4', serif">
  <rect width="600" height="760" fill="#FBFAF7"/>

  <!-- notebook page outer -->
  <rect x="24" y="24" width="552" height="712" fill="none" stroke="#1A1714" stroke-width="0.6"/>

  <!-- left margin rule (notebook style) -->
  <line x1="68" y1="24" x2="68" y2="736" stroke="#7B2D26" stroke-width="0.4" opacity="0.5"/>

  <!-- subtle ruled lines -->
  <line x1="68" y1="160" x2="576" y2="160" stroke="#D8D4CC" stroke-width="0.3" opacity="0.4"/>
  <line x1="68" y1="260" x2="576" y2="260" stroke="#D8D4CC" stroke-width="0.3" opacity="0.4"/>
  <line x1="68" y1="370" x2="576" y2="370" stroke="#D8D4CC" stroke-width="0.3" opacity="0.4"/>
  <line x1="68" y1="490" x2="576" y2="490" stroke="#D8D4CC" stroke-width="0.3" opacity="0.4"/>
  <line x1="68" y1="600" x2="576" y2="600" stroke="#D8D4CC" stroke-width="0.3" opacity="0.4"/>

  <!-- ===== Header ===== -->
  <text x="80" y="58" font-size="10" font-family="ui-monospace, monospace" fill="#1F3A5F" letter-spacing="3">NIGHT · 想点子空间</text>
  <text x="80" y="98" font-size="22" font-weight="500" fill="#1A1714">notebook · 2026-03</text>
  <text x="80" y="120" font-size="13" font-style="italic" fill="#4A443C">jili / alice / bob — half-baked allowed</text>
  <line x1="80" y1="138" x2="556" y2="138" stroke="#1A1714" stroke-width="0.8"/>

  <!-- ===== Fragment 1: Contradiction (slightly tilted scrap) ===== -->
  <g transform="translate(80, 170) rotate(-1.5)">
    <rect x="0" y="0" width="280" height="76" fill="#F2EEE4" stroke="#D8D4CC" stroke-width="0.6"/>
    <text x="10" y="16" font-size="9" font-family="ui-monospace, monospace" fill="#1F3A5F" letter-spacing="1.5">CONTRADICTION · 03-12</text>
    <text x="10" y="38" font-size="13" fill="#1A1714">Google 测到 0.8%。理论说 ≥ 1%。</text>
    <text x="10" y="58" font-size="13" font-style="italic" fill="#1A1714">理论错了？还是 device 偏离假设？</text>
    <text x="240" y="58" font-size="14" fill="#7B2D26">?</text>
  </g>

  <!-- jili signature -->
  <text x="370" y="220" font-size="11" font-family="ui-monospace, monospace" fill="#4A443C">— jili</text>
  <line x1="368" y1="226" x2="402" y2="226" stroke="#7B2D26" stroke-width="1.5"/>

  <!-- Marginalia next to fragment 1 -->
  <text x="430" y="195" font-size="11" font-style="italic" fill="#8A8276">!!  这条最</text>
  <text x="430" y="210" font-size="11" font-style="italic" fill="#8A8276">    重要</text>

  <!-- dashed connector from contradiction → question -->
  <path d="M 220 250 Q 260 290 300 320" fill="none" stroke="#1A1714" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.6"/>

  <!-- ===== Fragment 2: Metaphor (handwritten-feel) ===== -->
  <g transform="translate(310, 180) rotate(1)">
    <rect x="0" y="0" width="240" height="68" fill="#F2EEE4" stroke="#D8D4CC" stroke-width="0.6"/>
    <text x="10" y="16" font-size="9" font-family="ui-monospace, monospace" fill="#1F3A5F" letter-spacing="1.5">METAPHOR · 03-15</text>
    <text x="10" y="38" font-size="13" font-style="italic" fill="#1A1714">错误率像血压</text>
    <text x="10" y="56" font-size="11" font-style="italic" fill="#4A443C">不是常数 · 会调节 · 受多因素影响</text>
  </g>
  <text x="540" y="225" font-size="11" font-family="ui-monospace, monospace" fill="#4A443C">— alice</text>
  <line x1="538" y1="231" x2="575" y2="231" stroke="#7B2D26" stroke-width="1.5"/>

  <!-- ===== Fragment 3: Question list ===== -->
  <g transform="translate(80, 295)">
    <rect x="0" y="0" width="320" height="88" fill="#F2EEE4" stroke="#D8D4CC" stroke-width="0.6"/>
    <text x="10" y="16" font-size="9" font-family="ui-monospace, monospace" fill="#1F3A5F" letter-spacing="1.5">QUESTION · 03-18</text>
    <text x="10" y="38" font-size="13" fill="#1A1714">如果是 device 偏离，哪个参数主导？</text>
    <text x="20" y="58" font-size="12" fill="#4A443C">·  T₁ 退相干时间？</text>
    <text x="20" y="74" font-size="12" fill="#4A443C">·  串扰 xtalk？</text>
    <text x="20" y="78" font-size="12" font-style="italic" fill="#7B2D26">·</text>
    <text x="28" y="80" font-size="12" font-style="italic" fill="#7B2D26">  温漂 drift？  ← 这个没人测过</text>
  </g>
  <text x="410" y="350" font-size="11" font-family="ui-monospace, monospace" fill="#4A443C">— jili</text>
  <line x1="408" y1="356" x2="442" y2="356" stroke="#7B2D26" stroke-width="1.5"/>

  <!-- Marginalia -->
  <text x="470" y="335" font-size="11" font-style="italic" fill="#8A8276">→ 跟 alice</text>
  <text x="470" y="350" font-size="11" font-style="italic" fill="#8A8276">    讨论过</text>

  <!-- doodle: small circle with question mark -->
  <circle cx="460" cy="380" r="14" fill="none" stroke="#7B2D26" stroke-width="0.8" opacity="0.6"/>
  <text x="460" y="385" font-size="14" fill="#7B2D26" text-anchor="middle" opacity="0.7">?</text>

  <!-- dashed connector from question → thought-experiment -->
  <path d="M 240 395 Q 280 430 320 470" fill="none" stroke="#1A1714" stroke-width="0.6" stroke-dasharray="2,3" opacity="0.6"/>

  <!-- ===== Fragment 4: Thought experiment ===== -->
  <g transform="translate(80, 410) rotate(-0.5)">
    <rect x="0" y="0" width="300" height="78" fill="#F2EEE4" stroke="#D8D4CC" stroke-width="0.6"/>
    <text x="10" y="16" font-size="9" font-family="ui-monospace, monospace" fill="#1F3A5F" letter-spacing="1.5">THOUGHT-EXPERIMENT · 03-22</text>
    <text x="10" y="38" font-size="13" font-style="italic" fill="#1A1714">假设：把 device 调到理想极限</text>
    <text x="10" y="58" font-size="12" fill="#4A443C">T₁ = ∞ · xtalk = 0 · drift = 0</text>
    <text x="10" y="74" font-size="11" font-style="italic" fill="#4A443C">→ 错误率应趋近 0 ... 真会吗？</text>
  </g>
  <text x="390" y="460" font-size="11" font-family="ui-monospace, monospace" fill="#4A443C">— bob</text>
  <line x1="388" y1="466" x2="420" y2="466" stroke="#3F5B3A" stroke-width="1.5"/>

  <!-- doodle: small triangle / arrow -->
  <path d="M 450 450 L 470 460 L 450 470 Z" fill="none" stroke="#1A1714" stroke-width="0.5" opacity="0.4"/>
  <text x="480" y="463" font-size="10" font-style="italic" fill="#8A8276">?</text>

  <!-- ===== Fragment 5: Counter-example / Constraint ===== -->
  <g transform="translate(80, 515) rotate(0.8)">
    <rect x="0" y="0" width="380" height="72" fill="#F2EEE4" stroke="#D8D4CC" stroke-width="0.6"/>
    <text x="10" y="16" font-size="9" font-family="ui-monospace, monospace" fill="#1F3A5F" letter-spacing="1.5">CONSTRAINT · 04-03</text>
    <text x="10" y="38" font-size="13" fill="#1A1714">Shor 1995: error threshold theorem.</text>
    <text x="10" y="56" font-size="11" font-style="italic" fill="#4A443C">物理边界 ≠ practical floor。约束 device-dependent model。</text>
  </g>
  <text x="470" y="555" font-size="11" font-family="ui-monospace, monospace" fill="#4A443C">— moss</text>
  <line x1="468" y1="561" x2="500" y2="561" stroke="#3F5B3A" stroke-width="1.5"/>

  <!-- ===== Sketch / doodle ===== -->
  <g transform="translate(330, 595)">
    <text x="0" y="0" font-size="10" font-family="ui-monospace, monospace" fill="#8A8276" letter-spacing="1.5">SKETCH · 04-05</text>
    <!-- small ad-hoc graph: error rate vs device -->
    <line x1="0" y1="20" x2="160" y2="20" stroke="#1A1714" stroke-width="0.4"/>
    <line x1="0" y1="20" x2="0" y2="60" stroke="#1A1714" stroke-width="0.4"/>
    <path d="M 0 50 Q 30 35 60 40 Q 90 45 120 30 Q 150 25 160 35" fill="none" stroke="#7B2D26" stroke-width="1.2"/>
    <circle cx="30" cy="38" r="2" fill="#7B2D26"/>
    <circle cx="60" cy="40" r="2" fill="#7B2D26"/>
    <circle cx="90" cy="45" r="2" fill="#7B2D26"/>
    <circle cx="120" cy="30" r="2" fill="#7B2D26"/>
    <circle cx="150" cy="28" r="2" fill="#7B2D26"/>
    <text x="0" y="78" font-size="9" font-family="ui-monospace, monospace" fill="#8A8276">error rate by device — 不是常数</text>
  </g>
  <text x="510" y="620" font-size="11" font-family="ui-monospace, monospace" fill="#4A443C">— alice</text>
  <line x1="508" y1="626" x2="538" y2="626" stroke="#7B2D26" stroke-width="1.5"/>

  <!-- ===== Tag legend bottom ===== -->
  <line x1="80" y1="690" x2="556" y2="690" stroke="#D8D4CC" stroke-width="0.5"/>
  <text x="80" y="710" font-size="10" font-family="ui-monospace, monospace" fill="#8A8276">atomic units 本页有:</text>
  <text x="80" y="725" font-size="10" font-family="ui-monospace, monospace" fill="#4A443C">contradiction · metaphor · question · thought-experiment · constraint · sketch</text>
</svg>
